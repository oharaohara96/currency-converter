<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Moedas</title>
</head>
<body>
    <section class="converter-container">
        <h1>Conversor de Moedas</h1>
        <p>Escolha as moedas e digite o valor para converter.</p>

        <div>
            <label for="amount-input">Valor para converter:</label>
            <input type="number" id="amount-input" placeholder="0.00" step="0.01">

            <select id="select-currency-from">
                <option value="BRL">Brasil (real)</option>
                <option value="JPY">Japao (iene)</option>
                <option value="USD">EUA (Dólar)</option>
            </select>

            <select id="change-currency">
                <option value="BRL">Brasil (real)</option>
                <option value="JPY">Japao (iene)</option>
                <option value="USD">EUA (Dólar)</option>
            </select>
        </div>

        <button id="convert-button">Converter</button>

        <div class="result-container">
    <div class="currency-box">
        <img class="currency-image-from" src="./Images/BR.png" alt="bandeira-origem">
        <p id="currency-name-from">Real Brasileiro</p>
    </div>

    <p>➔</p> <div class="currency-box">
        <img class="currency-image-to" src="./Images/USA.png" alt="bandeira-destino">
        <p id="currency-name-to">Dólar Americano</p>
        <h2 id="result-display">0,00</h2>
    </div>
</div>

    </section>

    <script src="./script/index.js"></script>
</body>
</html>
